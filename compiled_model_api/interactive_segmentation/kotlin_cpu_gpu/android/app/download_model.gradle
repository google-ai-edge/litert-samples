// Downloads the SAM 2.1 (Hiera-Tiny) models (converted with litert-torch) into the assets
// directory at build time so the large .tflite files are never committed to the repo.
// Both are GPU-clean (LITERT_CL, no banned ops / no >4-D tensors). The app runs the encoder on the
// GPU and the decoder on CPU (the decoder is GPU-resident but its fp16 GPU output is wrong on Pixel 8a).
//
//   - Image encoder (decoder-ready: folds conv_s0/conv_s1 + no_memory): litert-community/SAM2.1-Hiera-Tiny-Image-Encoder
//   - Mask decoder (prompt-conditioned, 3 multimask outputs):           litert-community/SAM2.1-Hiera-Tiny-Mask-Decoder

tasks.register('downloadSam2ImageEncoder', Download) {
    src 'https://huggingface.co/litert-community/SAM2.1-Hiera-Tiny-Image-Encoder/resolve/main/sam2_tiny_image_encoder_v2_fp16.tflite'
    dest project.ext.ASSET_DIR + '/sam2_image_encoder_fp16.tflite'
    overwrite false
}

tasks.register('downloadSam2MaskDecoder', Download) {
    src 'https://huggingface.co/litert-community/SAM2.1-Hiera-Tiny-Mask-Decoder/resolve/main/sam2_tiny_mask_decoder_fp16.tflite'
    dest project.ext.ASSET_DIR + '/sam2_mask_decoder_fp16.tflite'
    overwrite false
}

preBuild.dependsOn downloadSam2ImageEncoder
preBuild.dependsOn downloadSam2MaskDecoder
